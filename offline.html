<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | DN Splitter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #050b16, #0a1322);
      color: #eaf2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: rgba(15, 25, 42, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px 20px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    p {
      color: #9db1d3;
      margin: 0 0 20px;
      line-height: 1.5;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #58a6ff, #3f7cff);
      color: white;
    }

    .btn-secondary {
      background: #1c2a45;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">📡</div>

    <h1>No Internet Connection</h1>

    <p>
      DN Splitter needs an internet connection to load files and features.
      Please check your connection and try again.
    </p>

    <button class="btn" onclick="location.reload()">
      Retry
    </button>

    <br />

    <button class="btn btn-secondary" onclick="window.location.href='./index.html'">
      Go Home
    </button>
  </div>

</body>
</html>
